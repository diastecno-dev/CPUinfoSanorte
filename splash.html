<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #0f172a;
            /* Slate 900 */
            color: white;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            -webkit-app-region: drag;
        }

        .container {
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        .logo {
            width: 120px;
            height: 120px;
            margin-bottom: 24px;
            filter: drop-shadow(0 0 15px rgba(56, 189, 248, 0.4));
        }

        .title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 32px;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #38bdf8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <img class="logo" src="frontend/dist/logo.svg" alt="Sanorte Logo">
        <div class="title">CPU Info Sanorte</div>
        <div class="subtitle">Iniciando sistema...</div>
        <div class="loader"></div>
    </div>
</body>

</html>
